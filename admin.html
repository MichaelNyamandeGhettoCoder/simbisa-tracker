<!DOCTYPE html>
<html>
<head>
    <title>Admin - Caramel Cloud</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; padding: 15px; background: #f5f5f5; }
      .header { background: #d63384; color: white; padding: 15px; text-align: center; border-radius: 8px; }
      .login,.panel { background: white; padding: 20px; border-radius: 8px; margin: 15px 0; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #d63384; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; margin: 5px 0; }
      .delete-btn { background: #dc3545; }
      .product-item { border: 1px solid #ddd; padding: 10px; margin: 5px 0; border-radius: 5px; display: flex; align-items: center; gap: 10px; }
      .product-item img { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; }
      .hidden { display: none; }
        #upload-status { font-size: 14px; color: #d63384; margin: 5px 0; }
    </style>
</head>
<body>
    <div class="header"><h2>Caramel Cloud Admin</h2></div>

    <div id="login" class="login">
        <h3>Enter Admin PIN</h3>
        <input type="password" id="pin" placeholder="PIN">
        <button onclick="checkPin()">Login</button>
    </div>

    <div id="panel" class="panel hidden">
        <h3>Add New Product</h3>
        <input type="text" id="pname" placeholder="Product Name e.g. Red Velvet Cake">
        <input type="number" id="pprice" placeholder="Price e.g. 25">
        <select id="pcategory">
            <option value="Cakes"> Cakes</option>
            <option value="Cosmetics"> Cosmetics</option>
        </select>

        <label><strong>Product Photo:</strong></label>
        <input type="file" id="pimage" accept="image/*">
        <div id="upload-status"></div>

        <button onclick="addProduct()" id="add-btn">Add Product</button>

        <h3>Current Products</h3>
        <div id="product-list"></div>

        <button onclick="logout()" style="background:#6c757d;">Logout</button>
    </div>

    <script>
        const ADMIN_PIN = "1234";
        const IMGBB_API_KEY = "123fe4e015517b8deee68bae9212db71";

        function checkPin() {
            if (document.getElementById('pin').value === ADMIN_PIN) {
                document.getElementById('login').classList.add('hidden');
                document.getElementById('panel').classList.remove('hidden');
                loadProducts();
            } else {
                alert('Wrong PIN');
            }
        }

        function loadProducts() {
            let products = JSON.parse(localStorage.getItem('caramel_products') || '[]');
            let list = document.getElementById('product-list');
            list.innerHTML = '';

            products.forEach((p, index) => {
                list.innerHTML += `
                    <div class="product-item">
                        <img src="${p.image}" alt="${p.name}">
                        <div style="flex:1">
                            <strong>${p.name}</strong> - $${p.price}<br>
                            <small>[${p.category}]</small>
                        </div>
                        <button class="delete-btn" onclick="deleteProduct(${index})">Delete</button>
                    </div>
                `;
            });
        }

        async function uploadImage(file) {
            const formData = new FormData();
            formData.append('image', file);
            document.getElementById('upload-status').innerText = 'Uploading image...';
            document.getElementById('add-btn').disabled = true;
            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                document.getElementById('upload-status').innerText = 'Upload complete!';
                return data.data.url;
            } catch (error) {
                document.getElementById('upload-status').innerText = 'Upload failed. Try again.';
                return null;
            } finally {
                document.getElementById('add-btn').disabled = false;
            }
        }

        async function addProduct() {
            let name = document.getElementById('pname').value;
            let price = document.getElementById('pprice').value;
            let category = document.getElementById('pcategory').value;
            let imageFile = document.getElementById('pimage').files[0];
            if (!name ||!price) return alert('Name and price required');
            if (!imageFile) return alert('Please choose a photo');
            let imageUrl = await uploadImage(imageFile);
            if (!imageUrl) return;
            let products = JSON.parse(localStorage.getItem('caramel_products') || '[]');
            products.push({name, price: parseFloat(price), category, image: imageUrl});
            localStorage.setItem('caramel_products', JSON.stringify(products));
            document.getElementById('pname').value = '';
            document.getElementById('pprice').value = '';
            document.getElementById('pimage').value = '';
            document.getElementById('upload-status').innerText = '';
            loadProducts();
            alert('Product added! Refresh the main site to see it.');
        }

        function deleteProduct(index) {
            let products = JSON.parse(localStorage.getItem('caramel_products') || '[]');
            products.splice(index, 1);
            localStorage.setItem('caramel_products', JSON.stringify(products));
            loadProducts();
        }

        function logout() {
            document.getElementById('panel').classList.add('hidden');
            document.getElementById('login').classList.remove('hidden');
            document.getElementById('pin').value = '';
        }
    </script>
</body>
</html>
