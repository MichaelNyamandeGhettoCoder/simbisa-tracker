<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caramel Cloud Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
  <style>
    body {
      background: linear-gradient(135deg, #fdf2f8 0%, #fce7f3 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    input[type="file"]::file-selector-button {
      background: #d63384;
      color: white;
      border: 0;
      padding: 10px 20px;
      border-radius: 8px;
      margin-right: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 4px rgba(214, 51, 132, 0.3);
    }
    input[type="file"]::file-selector-button:hover {
      background: #b02a5b;
      transform: translateY(-1px);
      box-shadow: 0 4px 8px rgba(214, 51, 132, 0.4);
    }
   .shake {
      animation: shake 0.5s;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }
  </style>
</head>
<body class="p-4">
  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-xl p-8 border border-pink-100">
      <div class="text-center mb-8">
        <div class="text-5xl mb-4">🔒</div>
        <h1 class="text-3xl font-bold text-gray-800 mb-2">Admin Access</h1>
        <p class="text-sm text-gray-500">Enter password to continue</p>
      </div>

      <form id="loginForm" class="space-y-6">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
          <input type="password" id="passwordInput" required
                 class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 focus:border-[#d63384] focus:ring-2 focus:ring-pink-100 outline-none transition"
                 placeholder="••••••••">
          <p id="loginError" class="text-red-500 text-sm mt-2 hidden">Wrong password. Try again.</p>
        </div>

        <button type="submit"
                class="w-full bg-gradient-to-r from-[#d63384] to-[#c02a73] hover:from-[#b02a5b] hover:to-[#a02550] text-white font-bold py-4 rounded-xl shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all duration-200">
          🔓 Unlock Admin
        </button>
      </form>
    </div>
  </div>

  <!-- ADMIN PANEL - HIDDEN UNTIL LOGIN -->
  <div id="adminPanel" class="w-full max-w-lg hidden">
    <div class="bg-white rounded-2xl shadow-xl p-8 border border-pink-100">
      <div class="flex justify-between items-center mb-8">
        <div>
          <h1 class="text-3xl font-bold text-gray-800 mb-2">Add New Product</h1>
          <p class="text-sm text-gray-500">Fill in details and upload photos</p>
        </div>
        <button onclick="logout()" class="text-gray-400 hover:text-red-500 transition" title="Logout">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
          </svg>
        </button>
      </div>

      <form id="productForm" class="space-y-6">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Product Name</label>
          <input type="text" name="name" required placeholder="e.g. Chocolate Fudge Cake"
                 class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 focus:border-[#d63384] focus:ring-2 focus:ring-pink-100 outline-none transition placeholder:text-gray-400">
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Price USD</label>
          <input type="number" name="price" step="0.01" required placeholder="e.g. 25.99"
                 class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 focus:border-[#d63384] focus:ring-2 focus:ring-pink-100 outline-none transition placeholder:text-gray-400">
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Category</label>
          <select name="category" required
                  class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 focus:border-[#d63384] focus:ring-2 focus:ring-pink-100 outline-none transition">
            <option value="Cakes">🎂 Cakes</option>
            <option value="Cosmetics">💄 Cosmetics</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Product Photos</label>
          <input type="file" id="imageInput" multiple accept="image/*"
                 class="block w-full text-sm border-2 border-gray-200 rounded-xl cursor-pointer file:mr-4">
          <p class="text-xs text-gray-500 mt-2">Select multiple: front, back, side views. Double-click preview to zoom.</p>
        </div>

        <div id="previewGrid" class="grid grid-cols-3 md:grid-cols-4 gap-3"></div>

        <button type="submit"
                class="w-full bg-gradient-to-r from-[#d63384] to-[#c02a73] hover:from-[#b02a5b] hover:to-[#a02550] text-white font-bold py-4 rounded-xl shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all duration-200">
          ✨ Save Product
        </button>
      </form>
    </div>
  </div>

<script>
// CHANGE THIS PASSWORD
const ADMIN_PASSWORD = "caramel2026";

// Check if already logged in this session
if (sessionStorage.getItem('adminAuth') === 'true') {
  showAdminPanel();
}

document.getElementById('loginForm').onsubmit = (e) => {
  e.preventDefault();
  const password = document.getElementById('passwordInput').value;
  const errorMsg = document.getElementById('loginError');
  const loginBox = document.getElementById('loginScreen');

  if (password === ADMIN_PASSWORD) {
    sessionStorage.setItem('adminAuth', 'true');
    showAdminPanel();
  } else {
    errorMsg.classList.remove('hidden');
    loginBox.classList.add('shake');
    setTimeout(() => loginBox.classList.remove('shake'), 500);
    document.getElementById('passwordInput').value = '';
  }
};

function showAdminPanel() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('adminPanel').classList.remove('hidden');
}

function logout() {
  sessionStorage.removeItem('adminAuth');
  location.reload();
}

// PRODUCT FORM LOGIC
let allSelectedFiles = [];
let lightbox;

document.getElementById('imageInput').addEventListener('change', function(e) {
  if (this.files && this.files.length > 0) {
    allSelectedFiles.push(...Array.from(this.files));
    this.value = '';
    updatePreview();
  }
});

function updatePreview() {
  const grid = document.getElementById('previewGrid');
  grid.innerHTML = '';

  allSelectedFiles.forEach((file, idx) => {
    const url = URL.createObjectURL(file);
    const div = document.createElement('div');
    div.className = 'relative group';
    div.innerHTML = `
      <a href="${url}" class="glightbox" data-gallery="admin-preview">
        <img src="${url}" class="w-full h-24 object-cover rounded-lg border-2 border-gray-200 cursor-zoom-in hover:border-[#d63384] transition" alt="Photo ${idx + 1}">
      </a>
      <button type="button" onclick="removePhoto(${idx})"
              class="absolute -top-2 -right-2 bg-red-500 hover:bg-red-600 text-white rounded-full w-7 h-7 text-sm opacity-0 group-hover:opacity-100 transition shadow-lg">
        ✕
      </button>
    `;
    grid.appendChild(div);
  });

  if (lightbox) lightbox.destroy();
  lightbox = GLightbox({ selector: '.glightbox', zoomable: true });

  document.querySelectorAll('#previewGrid img').forEach(img => {
    img.ondblclick = (e) => { e.preventDefault(); img.parentElement.click(); };
  });
}

function removePhoto(index) {
  allSelectedFiles.splice(index, 1);
  updatePreview();
}

document.getElementById('productForm').onsubmit = async (e) => {
  e.preventDefault();
  const form = e.target;

  const imagePromises = allSelectedFiles.map(file => {
    return new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result);
      reader.readAsDataURL(file);
    });
  });

  const images = await Promise.all(imagePromises);

  const product = {
    name: form.name.value,
    price: parseFloat(form.price.value),
    category: form.category.value,
    images: images,
    image: images[0]
  };

  let products = JSON.parse(localStorage.getItem('caramel_products') || '[]');
  products.push(product);
  localStorage.setItem('caramel_products', JSON.stringify(products));

  alert(`✅ Saved ${product.name} with ${images.length} photo(s)!`);
  allSelectedFiles = [];
  form.reset();
  updatePreview();
};
</script>
</body>
</html>
