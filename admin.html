<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caramel Cloud Admin - Add Product</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
</head>
<body class="bg-gray-50 p-4 md:p-6">
  <div class="max-w-4xl mx-auto">
    <h1 class="text-2xl font-bold mb-6">Add New Product</h1>
    
    <form id="productForm" class="bg-white p-6 rounded-lg shadow space-y-5">
      <div>
        <label class="block text-sm font-medium mb-1">Product Name</label>
        <input type="text" name="name" required class="w-full border rounded px-3 py-2">
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Price USD</label>
        <input type="number" name="price" step="0.01" required class="w-full border rounded px-3 py-2">
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Description</label>
        <textarea name="description" rows="3" class="w-full border rounded px-3 py-2"></textarea>
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Product Photos</label>
        <input type="file" id="imageInput" name="images" multiple accept="image/*"
               class="block w-full text-sm border rounded file:mr-4 file:py-2 file:px-4 
                      file:rounded file:border-0 file:bg-blue-50 file:text-blue-700 cursor-pointer">
        <p class="text-xs text-gray-500 mt-1">Select front, back, side views. Double-click any preview to zoom.</p>
      </div>

      <!-- This is where previews show up -->
      <div id="previewGrid" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>

      <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-6 py-2 rounded">
        Save Product
      </button>
    </form>
  </div>

<script>
// This script handles multiple upload + preview + zoom/swipe
const imageInput = document.getElementById('imageInput');
const previewGrid = document.getElementById('previewGrid');
let lightbox;

imageInput.addEventListener('change', (e) => {
  previewGrid.innerHTML = '';
  const files = Array.from(e.target.files);
  
  files.forEach((file, idx) => {
    const url = URL.createObjectURL(file);
    
    const link = document.createElement('a');
    link.href = url;
    link.className = 'glightbox';
    link.setAttribute('data-gallery', 'product');
    
    const img = document.createElement('img');
    img.src = url;
    img.className = 'w-full h-32 object-cover rounded cursor-zoom-in hover:opacity-80 border';
    img.alt = `Product image ${idx + 1}`;
    
    img.addEventListener('dblclick', () => link.click());
    
    link.appendChild(img);
    previewGrid.appendChild(link);
  });
  
  if (lightbox) lightbox.destroy();
  lightbox = GLightbox({
    selector: '.glightbox',
    touchNavigation: true,
    loop: true,
    zoomable: true,
    openEffect: 'zoom',
    closeEffect: 'fade'
  });
});

document.getElementById('productForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const formData = new FormData(e.target);
  
  // TODO: Replace /api/products with your real endpoint
  console.log('Uploading', imageInput.files.length, 'images');
  
  try {
    const res = await fetch('/api/products', {
      method: 'POST',
      body: formData
    });
    if (res.ok) {
      alert('Product saved!');
      e.target.reset();
      previewGrid.innerHTML = '';
    }
  } catch (err) {
    alert('Demo: Product data ready. Connect your /api/products endpoint to save.');
  }
});
</script>
</body>
</html>
