<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caramel Cloud Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
</head>
<body class="bg-gray-50 p-4 md:p-6">
  <div class="max-w-4xl mx-auto">
    <h1 class="text-2xl font-bold mb-6">Add New Product</h1>

    <form id="productForm" class="bg-white p-6 rounded-lg shadow space-y-5">
      <div>
        <label class="block text-sm font-medium mb-1">Category</label>
        <select name="category" required class="w-full border rounded px-3 py-2">
          <option value="Cakes">Cakes</option>
          <option value="Cosmetics">Cosmetics</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Product Name</label>
        <input type="text" name="name" required class="w-full border rounded px-3 py-2">
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Price USD</label>
        <input type="number" name="price" step="0.01" required class="w-full border rounded px-3 py-2">
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Product Photos</label>
        <input type="file" id="imageInput" multiple accept="image/*"
               class="block w-full text-sm border rounded file:mr-4 file:py-2 file:px-4
                      file:rounded file:border-0 file:bg-blue-50 file:text-blue-700 cursor-pointer">
        <p class="text-xs text-gray-500 mt-1">Select 1 or more. Front, back, side views. Double-click preview to zoom.</p>
      </div>

      <div id="previewGrid" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>

      <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-6 py-2 rounded">
        Save Product
      </button>
    </form>
  </div>

<script>
let allSelectedFiles = [];
let lightbox;

document.getElementById('imageInput').addEventListener('change', function(e) {
  if (this.files && this.files.length > 0) {
    allSelectedFiles.push(...Array.from(this.files));
    this.value = '';
    updatePreview();
  }
});

function updatePreview() {
  const grid = document.getElementById('previewGrid');
  grid.innerHTML = '';

  allSelectedFiles.forEach((file, idx) => {
    const url = URL.createObjectURL(file);
    const div = document.createElement('div');
    div.className = 'relative group';
    div.innerHTML = `
      <a href="${url}" class="glightbox" data-gallery="admin-preview">
        <img src="${url}" class="w-full h-32 object-cover rounded border cursor-zoom-in hover:opacity-80" alt="Photo ${idx + 1}">
      </a>
      <button type="button" onclick="removePhoto(${idx})"
              class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-6 h-6 text-xs opacity-0 group-hover:opacity-100">
        ✕
      </button>
    `;
    grid.appendChild(div);
  });

  if (lightbox) lightbox.destroy();
  lightbox = GLightbox({ selector: '.glightbox', zoomable: true });

  document.querySelectorAll('#previewGrid img').forEach(img => {
    img.ondblclick = (e) => { e.preventDefault(); img.parentElement.click(); };
  });
}

function removePhoto(index) {
  allSelectedFiles.splice(index, 1);
  updatePreview();
}

document.getElementById('productForm').onsubmit = async (e) => {
  e.preventDefault();
  const form = e.target;

  // Convert all files to base64 for localStorage
  const imagePromises = allSelectedFiles.map(file => {
    return new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result);
      reader.readAsDataURL(file);
    });
  });

  const images = await Promise.all(imagePromises);

  const product = {
    name: form.name.value,
    price: parseFloat(form.price.value),
    category: form.category.value,
    images: images, // Array of all photos
    image: images[0] // First photo as main thumbnail
  };

  let products = JSON.parse(localStorage.getItem('caramel_products') || '[]');
  products.push(product);
  localStorage.setItem('caramel_products', JSON.stringify(products));

  alert(`Saved ${product.name} with ${images.length} photo(s)!`);
  allSelectedFiles = [];
  form.reset();
  updatePreview();
};
</script>
</body>
</html>
